<!-- It is document declaration.It tells browser we are using HTML document and it's
version is HTML5.
-->
<!doctype html>
<!-- lang="en" means the language of the content of the html document is english -->
<html lang="en">
  <head>
    <!-- HTML uses utf-8 character encoding -->
    <meta charset="utf-8" />

    <!-- It sets the width of the web page equal to the device width and initial 
    zoom level to 1.0 when the web page loads initially. -->
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <!-- Importing favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Importing png image as favicon  -->
    <link rel="icon" href="image.png" type="image/png" />

    <!-- Importing/Linking CSS  -->
    <link rel="stylesheet" href="css/style.css" type="text/css" />

    <!-- Linking a JavaScript file -->
    <script src="script.js" defer type="text/script"></script>

    <!-- title of the web page  -->
    <title>Structure Of HTML</title>
  </head>
  <body>
    <h1>coding is really fun</h1>
  </body>
</html>
